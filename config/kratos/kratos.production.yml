version: v25.4.0

# DSN for production (PostgreSQL)
# Injected via the DSN environment variable from docker-compose (Ory does NOT
# expand ${VAR} in YAML). docker-compose sets:
#   DSN=postgres://kratos_user:${KRATOS_DB_PASSWORD}@postgres:5432/kratos?sslmode=...
# The DSN env var overrides this placeholder entirely at runtime.
dsn: THIS_WILL_BE_OVERRIDDEN_BY_DSN_ENV_VAR

serve:
  public:
    # Must include /auth/ so verification email link is https://auth.cativo.dev/auth/self-service/verification?code=...&flow=...
    base_url: https://auth.cativo.dev/auth/
    cors:
      enabled: true
      allowed_origins:
        - https://auth.cativo.dev
        - https://admin.cativo.dev
        - https://api.cativo.dev
      allowed_methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      allowed_headers:
        - "*"
      exposed_headers:
        - Content-Type
        - X-Kratos-Request-Id
      allow_credentials: true
      max_age: 3600
  admin:
    base_url: http://kratos:4434/

selfservice:
  # Neutral fallback for flows that complete WITHOUT a return_to (multi-app IdP:
  # admin/dashboard is the wrong default — most users aren't admins). Per-flow
  # return_to / after_verification_return_to override this when context exists.
  default_browser_return_url: https://auth.cativo.dev/auth/login
  allowed_return_urls:
    - https://auth.cativo.dev
    - https://admin.cativo.dev
    - https://admin.cativo.dev/dashboard
    - https://api.cativo.dev
    # The app is the neutral DEFAULT_RETURN_URL target (VITE_DEFAULT_RETURN_URL in
    # the prod build); Kratos validates return_to against this list, so the app
    # host must be allowed or context-less flows would 400.
    - https://app.cativo.dev
    - https://app.cativo.dev/

  methods:
    password:
      enabled: true
      config:
        # Enable in production for security
        haveibeenpwned_enabled: true

  flows:
    error:
      ui_url: https://auth.cativo.dev/auth/error

    settings:
      ui_url: https://auth.cativo.dev/settings
      privileged_session_max_age: 15m
      required_aal: highest_available

    recovery:
      enabled: true
      ui_url: https://auth.cativo.dev/auth/recovery
      use: code

    verification:
      enabled: true
      ui_url: https://auth.cativo.dev/auth/verification
      use: code
      after:
        # Neutral fallback when the verification flow has no return_to /
        # after_verification_return_to (e.g. an app user clicking the email link
        # without context). Was admin/dashboard → wrongly dumped app users in admin.
        default_browser_return_url: https://auth.cativo.dev/auth/login

    logout:
      after:
        default_browser_return_url: https://auth.cativo.dev/auth/login

    login:
      ui_url: https://auth.cativo.dev/auth/login
      lifespan: 10m
      after:
        hooks:
          - hook: require_verified_address

    registration:
      lifespan: 10m
      ui_url: https://auth.cativo.dev/registration
      enable_legacy_one_step: true
      after:
        password:
          hooks:
            # No session until verified: user must complete verification, then log in
            - hook: show_verification_ui

log:
  level: info
  format: json
  leak_sensitive_values: false

secrets:
  # Ory does NOT expand ${VAR} syntax in YAML files. Secrets are injected via
  # path-mapped environment variables (dots → underscores, uppercase).
  # docker-compose passes SECRETS_COOKIE, SECRETS_CIPHER, SECRETS_DEFAULT,
  # mapping them from KRATOS_SECRETS_* in .env.
  #
  # Env var → config key mapping:
  #   SECRETS_COOKIE  → secrets.cookie[0]   (≥16 chars)
  #   SECRETS_CIPHER  → secrets.cipher[0]   (exactly 32 chars, xchacha20-poly1305)
  #   SECRETS_DEFAULT → secrets.default[0]  (≥16 chars, fallback signing key)

ciphers:
  algorithm: xchacha20-poly1305

hashers:
  algorithm: bcrypt
  bcrypt:
    cost: 12

identity:
  default_schema_id: default
  schemas:
    - id: default
      url: file:///etc/config/kratos/identity.schema.json

courier:
  template_override_path: /etc/config/kratos/courier-templates
  smtp:
    # Production SMTP: injected at runtime via COURIER_SMTP_CONNECTION_URI and
    # COURIER_SMTP_FROM_ADDRESS environment variables (path-mapped: dots →
    # underscores, uppercase). docker-compose maps these from SMTP_* in .env.
    # Note: the env var name for connection_uri is COURIER_SMTP_CONNECTION_URI,
    # not SMTP_CONNECTION_URI — compose renames it before passing to the container.
    # The placeholders below are OVERRIDDEN by those env vars (Ory does NOT expand
    # ${VAR} in YAML); they exist so the schema sees courier.smtp as a valid object
    # (the smtp block is required to be an object — a null block fails validation).
    connection_uri: smtps://CHANGE_ME@smtp.example.com:465/?skip_ssl_verify=false
    from_address: noreply@cativo.dev

cookies:
  domain: cativo.dev
  path: /
  same_site: Lax
  secure: "true"  # Ory expects string not boolean for cookies.secure

session:
  lifespan: 720h
  whoami:
    required_aal: highest_available

clients:
  http:
    # Block outgoing HTTP calls to RFC-1918 private IP ranges to prevent SSRF.
    # Enabled in production only; local dev needs private IPs (Mailpit, postgres).
    # Ref: config schema clients.http.disallow_private_ip_ranges (v25.4.0 confirmed).
    disallow_private_ip_ranges: true

feature_flags:
  use_continue_with_transitions: true
