  upstream:
    preserve_host: true
    url: "http://api:8080"
  match:
    url: "<(http|https)://(gateway|gateway\\.cativo\\.dev|localhost(:[0-9]+)?)/api/(health|public)>"
    methods:
      - GET
      - OPTIONS
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: header
      config:
        headers:
          X-Frontend-Source: '{{ .RequestHeader "Referer" }}'

# Protected API endpoint (for frontend-app and other clients)
# ZERO TRUST: Oathkeeper validates ALL authentication and authorization
# Backend trusts headers injected by Oathkeeper - NO token validation in backend
- id: "protected-api"
  upstream:
    preserve_host: true
    url: "http://api:8080"
  match:
    url: "<(http|https)://(gateway|gateway\\.cativo\\.dev|localhost(:[0-9]+)?)/api/.*>"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
  authenticators:
    # Try session cookie first (for web frontends)
    # OAuth2 token support handled via oauth2_introspection (if configured)
    - handler: cookie_session
      config:
        check_session_url: http://kratos:4433/sessions/whoami
        preserve_path: true
        extra_from: "@this"
        subject_from: "identity.id"
  authorizer:
    # Rate limiting: implement at reverse proxy (nginx/Traefik) or API layer; Oathkeeper has no built-in remote_json_rate_limit.
    handler: allow
  mutators:
    - handler: id_token
      config:
        claims: |
          {
            "sub": "{{ print .Subject }}",
            "email": "{{ print .Extra.identity.traits.email }}",
            "name": "{{ print .Extra.identity.traits.full_name }}",
            "role": "{{ print .Extra.identity.metadata_public.role }}",
            "iat": {{ .Now | date "unix" }},
            "exp": {{ .Now | date_modify "+15m" | date "unix" }}
          }

# Infrastructure-level protected API endpoint (requires specific role)
# ZERO TRUST: Keto decides "can enter?", backend decides "what can do?"
- id: "keto-protected-api"
  upstream:
    preserve_host: true
    url: "http://api:8080"
  match:
    url: "<(http|https)://(gateway|gateway\\.cativo\\.dev)/api/secure/.*>"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
  authenticators:
    - handler: cookie_session
      config:
        check_session_url: http://kratos:4433/sessions/whoami
        preserve_path: true
        extra_from: "@this"
        subject_from: "identity.id"
  authorizer:
    # Check membership in Keto "ranks" namespace (platform_admin#member@user:<id>); see AUTH_AND_RBAC.md.
    handler: remote_json
    config:
      remote: http://keto:4466/relation-tuples/check
      payload: '{"namespace":"ranks","object":"platform_admin","relation":"member","subject_id":"user:{{ print .Subject }}"}'
      forward_response_headers_to_upstream:
        - Content-Type
  mutators:
    - handler: id_token
      config:
        claims: |
          {
            "sub": "{{ print .Subject }}",
            "email": "{{ print .Extra.identity.traits.email }}",
            "name": "{{ print .Extra.identity.traits.full_name }}",
            "role": "{{ print .Extra.identity.metadata_public.role }}",
            "iat": {{ .Now | date "unix" }},
            "exp": {{ .Now | date_modify "+15m" | date "unix" }}
          }

