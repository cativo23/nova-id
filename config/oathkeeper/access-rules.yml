  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Kratos Public API (for self-service flows - login, registration, recovery, etc.)
# ZERO TRUST: All frontend requests must go through Oathkeeper
# Frontends call Oathkeeper at /self-service/*, /sessions/*, etc.
# Oathkeeper forwards to Kratos Public API
- id: "kratos-public"
  upstream:
    preserve_host: false
    url: "http://kratos:4433"
  match:
    # Match paths starting with /self-service, /sessions, /health, /schemas
    # Called via Oathkeeper: http://localhost:4455/self-service/...
    # Query parameters are automatically preserved by Oathkeeper
    url: "<(http|https)://(kratos-public|id\\.cativo\\.dev|localhost(:[0-9]+)?|oathkeeper(:[0-9]+)?)/(self-service|sessions|health|schemas).*>"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS # Required for CORS preflight requests (browsers send OPTIONS before actual request)
  authenticators:
    - handler: noop # Noop allows preflight OPTIONS requests without authentication
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Kratos Admin API (for API service to verify users)
# ZERO TRUST: API calls this through Oathkeeper - API cannot directly reach Kratos
# API is on external network, must go through Oathkeeper (on both networks)
# SECURITY: Only users with General rank or higher can access Kratos Admin API
# Authorization is checked via Keto using remote_json authorizer
- id: "kratos-admin"
  upstream:
    preserve_host: false
    url: "http://kratos:4434"
  match:
    # Match Kratos Admin API paths - using regex pattern
    # Oathkeeper forwards the matched path as-is to Kratos
    # Pattern matches:
    #   - http://localhost:4455/admin/identities -> forwards to http://kratos:4434/admin/identities
    #   - http://localhost:4455/admin/identities/{id} -> forwards to http://kratos:4434/admin/identities/{id}
    #   - http://oathkeeper:4455/admin/identities/{id} -> API calls this from external network
    #   - http://localhost:4455/admin/sessions/{id} -> forwards to http://kratos:4434/admin/sessions/{id}
    #   - http://localhost:4455/admin/recovery/link -> forwards to http://kratos:4434/admin/recovery/link
    # Using .* to match any path after the base endpoint
    # Supports: gateway.cativo.dev, localhost, and oathkeeper (for API calls from external network)
    url: "<(http|https)://(gateway\\.cativo\\.dev|localhost(:[0-9]+)?|oathkeeper(:[0-9]+)?)/admin/(identities.*|sessions.*|recovery.*|health|version|schemas.*)>"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
  authenticators:
    # For API calls: API will include session cookie from original request
    # Oathkeeper validates session and forwards to Kratos
    - handler: cookie_session
  authorizer:
    handler: remote_json
    config:
      # Check if user has permission to view users (admin access)
      # Keto will automatically resolve RBAC: checks if user is member of a rank that has view_users permission
      # Example: user:123 -> rank:General#member -> users:management#view_users@rank:General
      # Using POST /relation-tuples/check (not /openapi) which returns:
      #   - 200 OK when allowed: true (Oathkeeper allows access)
      #   - 403 Forbidden when allowed: false (Oathkeeper denies access)
      remote: http://keto:4466/relation-tuples/check
      payload: '{"namespace":"users","object":"management","relation":"view_users","subject_id":"user:{{ print .Subject }}"}'
      forward_response_headers_to_upstream:
        - Content-Type
  mutators:
    - handler: header
      config:
        headers:
          X-User-ID: "{{ print .Subject }}"
          X-User-Email: "{{ print .Extra.identity.traits.email }}"

# Hydra Public API (for API service to introspect OAuth2 tokens)
# ZERO TRUST: API calls this through Oathkeeper - API cannot directly reach Hydra
# API is on external network, must go through Oathkeeper (on both networks)
- id: "hydra-public"
  upstream:
    preserve_host: false
    strip_path: "/hydra-public"
    url: "http://hydra:4444"
  match:
    # Match Hydra public endpoints (OAuth2, OIDC, health, etc.)
    # API calls: http://oathkeeper:4455/hydra-public/oauth2/introspect -> forwards to /oauth2/introspect
    # Also supports: oidc.cativo.dev, localhost:4455 (gateway), oathkeeper (for API calls)
    # Supports: gateway.cativo.dev, localhost, and oathkeeper (for API calls from external network)
    url: "<(http|https)://(hydra-public|oidc\\.cativo\\.dev|localhost(:[0-9]+)?|oathkeeper(:[0-9]+)?)/hydra-public/(oauth2|health|version|\\.well-known).*>"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
  authenticators:
    - handler: noop
  authorizer:
    handler: allow
  mutators:
    - handler: noop

# Hydra Admin API (for frontend-admin to manage OAuth2 clients)
# ZERO TRUST: Frontend calls this through Oathkeeper - Frontend cannot directly reach Hydra
# Frontend is on external network, must go through Oathkeeper (on both networks)
- id: "hydra-admin"
  upstream:
    preserve_host: false
    strip_path: "/hydra-admin"
    url: "http://hydra:4445"
  match:
    # Match Hydra Admin API paths (clients, oauth2 tokens, etc.)
    # Frontend calls: http://localhost:4455/hydra-admin/clients -> forwards to http://hydra:4445/clients
    # Supports: gateway.cativo.dev, localhost, and oathkeeper (for API calls from external network)
    url: "<(http|https)://(gateway\\.cativo\\.dev|localhost(:[0-9]+)?|oathkeeper(:[0-9]+)?)/hydra-admin/.*>"
    methods:
      - GET
      - POST
      - PUT
      - DELETE
      - PATCH
      - OPTIONS
  authenticators:
