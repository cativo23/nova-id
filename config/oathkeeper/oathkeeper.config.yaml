log:
  level: debug
  format: json

serve:
  proxy:
    port: 4455
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:5173 # Frontend Auth (Self-Service UI)
        - http://localhost:5174 # Frontend Admin (Admin Dashboard)
        - http://localhost:5175 # Frontend App (Test Application)
        - http://localhost:3000
        - http://gateway.cativo.dev
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - "*" # Allow all headers (Oathkeeper v25.4.0 supports wildcard)
      exposed_headers:
        - Content-Type
        - X-Oathkeeper-Request-Id
        - Access-Control-Allow-Origin
        - Access-Control-Allow-Credentials
      allow_credentials: true
      debug: true
  api:
    port: 4456

errors:
  fallback:
    - json

  handlers:
    redirect:
      enabled: true
      config:
        to: http://localhost:5173/auth/login
        when:
          - error:
              - unauthorized
              - forbidden
            request:
              header:
                accept:
                  - text/html
    json:
      enabled: true
      config:
        verbose: true

access_rules:
  matching_strategy: regexp
  repositories:
    - file:///etc/config/oathkeeper/access-rules.yml

authenticators:
  anonymous:
    enabled: true
    config:
      subject: guest

  cookie_session:
    enabled: true
    config:
      check_session_url: http://kratos:4433/sessions/whoami
      preserve_path: true
      extra_from: "@this"
      subject_from: "identity.id"
      only:
        - ory_kratos_session

  noop:
    enabled: true

authorizers:
  allow:
    enabled: true

  remote:
    enabled: true
    config:
      remote: http://keto:4466/relation-tuples/check
      forward_response_headers_to_upstream:
        - Content-Type

  remote_json:
    enabled: true
    config:
      # Default config - actual values are set per rule
      remote: http://keto:4466/relation-tuples/check
      payload: "{}"
      forward_response_headers_to_upstream:
        - Content-Type

mutators:
  noop:
    enabled: true

  header:
    enabled: true
    config:
      headers:
        X-User-ID: "{{ print .identity.id }}"
        X-User-Email: "{{ print .identity.traits.email }}"

  id_token:
    enabled: true
    config:
      issuer_url: http://localhost:4455/
      jwks_url: file:///etc/config/oathkeeper/id_token.jwks.json
      claims: |
        {
          "session": {{ .Extra | toJson }}
        }
