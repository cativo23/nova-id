log:
  level: info
  format: json

serve:
  proxy:
    port: 4455
    cors:
      enabled: true
      allowed_origins:
        - https://auth.cativo.dev
        - https://admin.cativo.dev
        - https://api.cativo.dev
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - "*"
      exposed_headers:
        - Content-Type
        - X-Oathkeeper-Request-Id
        - Access-Control-Allow-Origin
        - Access-Control-Allow-Credentials
      allow_credentials: true
      debug: false
  api:
    port: 4456

errors:
  fallback:
    - json

  handlers:
    redirect:
      enabled: true
      config:
        to: https://auth.cativo.dev/auth/login
        when:
          - error:
              - unauthorized
              - forbidden
            request:
              header:
                accept:
                  - text/html
    json:
      enabled: true
      config:
        verbose: false

access_rules:
  matching_strategy: regexp
  repositories:
    - file:///etc/config/oathkeeper/rules.production.json

authenticators:
  anonymous:
    enabled: true
    config:
      subject: guest

  cookie_session:
    enabled: true
    config:
      check_session_url: http://kratos:4433/sessions/whoami
      preserve_path: true
      extra_from: "@this"
      subject_from: "identity.id"
      only:
        - ory_kratos_session

  oauth2_introspection:
    enabled: true
    config:
      introspection_url: http://hydra:4445/oauth2/introspect
      required_scope:
        - oauth2
      token_from:
        header: Authorization
        sources:
          - Bearer

  noop:
    enabled: true

authorizers:
  allow:
    enabled: true

  remote:
    enabled: true
    config:
      remote: http://keto:4466/relation-tuples/check
      forward_response_headers_to_upstream:
        - Content-Type

  remote_json:
    enabled: true
    config:
      remote: http://keto:4466/relation-tuples/check
      payload: "{}"
      forward_response_headers_to_upstream:
        - Content-Type

mutators:
  noop:
    enabled: true

  header:
    enabled: true
    config:
      headers:
        X-User-ID: "{{ print .Subject }}"
        X-User-Email: "{{ print .Extra.identity.traits.email }}"
        X-User-Role: "{{ if .Extra.identity.metadata_public }}{{ print .Extra.identity.metadata_public.role }}{{ end }}"

  id_token:
    enabled: true
    config:
      issuer_url: https://api.cativo.dev/
      jwks_url: file:///etc/config/oathkeeper/id_token.jwks.json
      claims: |
        {
          "email": "{{ if .Extra.identity }}{{ .Extra.identity.traits.email }}{{ else }}{{ if index .Extra \"ext\" }}{{ index (index .Extra \"ext\") \"email\" }}{{ else }}{{ if index .Extra \"session\" }}{{ index (index .Extra \"session\") \"email\" }}{{ else }}{{ index .Extra \"email\" }}{{ end }}{{ end }}{{ end }}",
          "name": "{{ if .Extra.identity }}{{ .Extra.identity.traits.full_name }}{{ else }}{{ if index .Extra \"ext\" }}{{ index (index .Extra \"ext\") \"name\" }}{{ else }}{{ if index .Extra \"session\" }}{{ index (index .Extra \"session\") \"name\" }}{{ else }}{{ index .Extra \"name\" }}{{ end }}{{ end }}{{ end }}",
          "role": "{{ if .Extra.identity }}{{ if .Extra.identity.metadata_public }}{{ .Extra.identity.metadata_public.role }}{{ end }}{{ else }}{{ if index .Extra \"ext\" }}{{ index (index .Extra \"ext\") \"role\" }}{{ else }}{{ if index .Extra \"session\" }}{{ index (index .Extra \"session\") \"role\" }}{{ else }}{{ index .Extra \"role\" }}{{ end }}{{ end }}{{ end }}"
        }
