log:
  level: debug
  format: json

serve:
  proxy:
    port: 4455
    cors:
      enabled: true
      allowed_origins:
        - http://auth.ory.localhost
        - http://admin.ory.localhost
        - http://api.ory.localhost
        - http://app.ory.localhost
        - http://localhost:5173
        - http://localhost:5174
        - http://localhost:5175
        - http://localhost:3000
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - "*"
      exposed_headers:
        - Content-Type
        - X-Oathkeeper-Request-Id
        - Access-Control-Allow-Origin
        - Access-Control-Allow-Credentials
      allow_credentials: true
      debug: true
  api:
    port: 4456

errors:
  fallback:
    - json

  handlers:
    redirect:
      enabled: true
      config:
        to: http://auth.local/auth/login
        when:
          - error:
              - unauthorized
              - forbidden
            request:
              header:
                accept:
                  - text/html
    json:
      enabled: true
      config:
        verbose: true

access_rules:
  matching_strategy: regexp
  repositories:
    - file:///etc/config/oathkeeper/rules.local.json

authenticators:
  anonymous:
    enabled: true
    config:
      subject: guest

  cookie_session:
    enabled: true
    config:
      check_session_url: http://kratos:4433/sessions/whoami
      preserve_path: true
      extra_from: "@this"
      subject_from: "identity.id"
      only:
        - ory_kratos_session

  oauth2_introspection:
    enabled: true
    config:
      # Introspection is on Hydra admin API (4445), not public (4444). Public returns 404.
      introspection_url: http://hydra:4445/oauth2/introspect
      token_from:
        header: Authorization

  noop:
    enabled: true

authorizers:
  allow:
    enabled: true

  remote:
    enabled: true
    config:
      remote: http://keto:4466/relation-tuples/check
      forward_response_headers_to_upstream:
        - Content-Type

  remote_json:
    enabled: true
    config:
      remote: http://keto:4466/relation-tuples/check
      payload: "{}"
      forward_response_headers_to_upstream:
        - Content-Type

mutators:
  noop:
    enabled: true

  header:
    enabled: true
    config:
      headers:
        X-User-ID: "{{ print .Subject }}"
        X-User-Email: "{{ print .Extra.identity.traits.email }}"
        X-User-Role: "{{ if .Extra.identity.metadata_public }}{{ print .Extra.identity.metadata_public.role }}{{ end }}"

  id_token:
    enabled: true
    config:
      issuer_url: http://api.local/
      jwks_url: file:///etc/config/oathkeeper/id_token.jwks.json
      claims: |
        {
          "email": "{{ print .Extra.identity.traits.email }}",
          "name": "{{ print .Extra.identity.traits.full_name }}",
          "role": "{{ if .Extra.identity.metadata_public }}{{ print .Extra.identity.metadata_public.role }}{{ end }}"
        }
