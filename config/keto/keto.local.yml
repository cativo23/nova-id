version: v25.4.0

# DSN for local development (PostgreSQL). Injected via the DSN environment
# variable from docker-compose (Ory does NOT expand ${VAR} in YAML; the DSN env
# var overrides this value verbatim at runtime). Kept here — matching
# keto.production.yml — so the file is honest about the backing store. Was
# `memory`, which silently dropped every tuple on restart and made the access
# layer impossible to fail-closed (seeded admins would vanish on restart).
dsn: postgres://keto_user:${KETO_DB_PASSWORD}@postgres:5432/keto?sslmode=disable&max_conns=20&max_idle_conns=4

namespaces:
  - name: system
    id: 0
  - name: users
    id: 1
  - name: admin
    id: 2
  - name: nova
    id: 3
  - name: ranks
    id: 4
  - name: roles
    id: 5

serve:
  read:
    host: 0.0.0.0
    port: 4466
  write:
    host: 0.0.0.0
    port: 4467

log:
  level: debug
  format: json
