version: v2.2.0

serve:
  public:
    port: 4444
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:5173
        - http://localhost:3000
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Requested-With
      exposed_headers:
        - Content-Type
        - X-Hydra-Request-Id
      allow_credentials: true
      max_age: 3600
  admin:
    port: 4445
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:5173
        - http://localhost:3000
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Requested-With
      exposed_headers:
        - Content-Type
        - X-Hydra-Request-Id
      allow_credentials: true
      max_age: 3600

dsn: memory

urls:
  # URLs - override via environment variables in docker-compose.yml if needed
  # For development: http://localhost:4455
  # For production: https://gateway.cativo.dev (set via env vars)
  self:
    issuer: https://oidc.cativo.dev
  consent: http://localhost:4455/consent
  login: http://localhost:4455/login
  logout: http://localhost:4455/logout
  error: http://localhost:4455/error
  post_logout_redirect: http://localhost:4455

strategies:
  access_token: jwt
  scope: exact

ttl:
  access_token: 1h
  refresh_token: 720h
  id_token: 1h
  auth_code: 10m

oauth2:
  expose_internal_errors: false
  hashers:
    algorithm: bcrypt
    bcrypt:
      cost: 8

log:
  level: debug
  format: json

secrets:
  system:
    - ${HYDRA_SECRETS_SYSTEM}
