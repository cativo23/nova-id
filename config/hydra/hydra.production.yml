version: v25.4.0

# DSN for production (PostgreSQL). Injected via the DSN environment variable from
# docker-compose (Ory does NOT expand ${VAR} in YAML). docker-compose sets:
#   DSN=postgres://hydra_user:${HYDRA_DB_PASSWORD}@postgres:5432/hydra?sslmode=...
# The DSN env var overrides this placeholder entirely at runtime.
dsn: THIS_WILL_BE_OVERRIDDEN_BY_DSN_ENV_VAR

serve:
  public:
    port: 4444
    cors:
      enabled: true
      allowed_origins:
        - https://auth.cativo.dev
        - https://admin.cativo.dev
        - https://id.cativo.dev
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Requested-With
      exposed_headers:
        - Content-Type
        - X-Hydra-Request-Id
      allow_credentials: true
      max_age: 3600
  admin:
    port: 4445
    cors:
      enabled: true
      allowed_origins:
        - https://auth.cativo.dev
        - https://admin.cativo.dev
        - https://id.cativo.dev
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
        - OPTIONS
      allowed_headers:
        - Authorization
        - Content-Type
        - X-Requested-With
      exposed_headers:
        - Content-Type
        - X-Hydra-Request-Id
      allow_credentials: true
      max_age: 3600
  cookies:
    domain: cativo.dev
    same_site_mode: Lax
    secure: true

urls:
  self:
    issuer: https://id.cativo.dev/
  consent: https://auth.cativo.dev/auth/consent
  login: https://auth.cativo.dev/auth/login
  logout: https://auth.cativo.dev/auth/logout
  error: https://id.cativo.dev/error
  post_logout_redirect: https://id.cativo.dev

strategies:
  access_token: jwt
  scope: exact

ttl:
  access_token: 1h
  refresh_token: 720h
  id_token: 1h
  auth_code: 10m

oauth2:
  expose_internal_errors: false
  hashers:
    algorithm: bcrypt
    bcrypt:
      cost: 12

log:
  level: info
  format: json

secrets:
  # Ory does NOT expand ${VAR} in YAML, and the HYDRA_ prefix is NOT a recognized
  # path-mapped name. The system secret (signs/encrypts OAuth2 tokens + login/consent
  # challenges) is injected via the path-mapped env var SECRETS_SYSTEM, which
  # docker-compose maps from HYDRA_SYSTEM_SECRET in .env.
  #   SECRETS_SYSTEM → secrets.system[0]  (≥16 chars)
  # Intentionally left empty here (fail-safe): if the env var is absent the service
  # refuses to boot rather than silently signing tokens with a placeholder.
