# Nginx reverse proxy for local domain routing
# Routes admin.ory.localhost -> frontend-admin:5174
# Routes auth.ory.localhost -> frontend-auth:5173
# Routes api.ory.localhost -> oathkeeper:4455
# Routes app.ory.localhost -> frontend-app:5175

# Default server - returns 404 for unknown domains
server {
    listen 80 default_server;
    server_name _;
    return 404;
}

server {
    listen 80;
    server_name admin.ory.localhost;

    # Proxy /api/* directly to Oathkeeper (bypasses Vite)
    # Don't strip /api prefix - Oathkeeper rules handle it
    location /api/ {
        proxy_pass http://oathkeeper:4455;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $scheme://$host;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Remove Secure flag from Set-Cookie headers for local HTTP development
        proxy_cookie_flags ~ secure;
    }
    
    # Handle /api without trailing slash - redirect to /api/
    location = /api {
        return 301 $scheme://$host/api/;
    }

    # All other routes go to Vite dev server
    location / {
        proxy_pass http://frontend-admin:5174;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

server {
    listen 80;
    server_name auth.ory.localhost;

    # Proxy /api/* directly to Oathkeeper (bypasses Vite)
    # Don't strip /api prefix - Oathkeeper rules handle it
    location /api/ {
        proxy_pass http://oathkeeper:4455;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $scheme://$host;
        
        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        
        # Remove Secure flag from Set-Cookie headers for local HTTP development
        proxy_cookie_flags ~ secure;
    }
    
    # Handle /api without trailing slash - redirect to /api/
    location = /api {
        return 301 $scheme://$host/api/;
    }

    # Kratos logout/self-service URLs: /auth/self-service/* and /auth/sessions/* (from Kratos base_url)
    # Proxy to Oathkeeper as /api/self-service/* so Kratos handles logout and redirects
    location ~ ^/auth/(self-service|sessions)/ {
        rewrite ^/auth/(.*)$ /api/$1 break;
        proxy_pass http://oathkeeper:4455;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin $scheme://$host;
        proxy_cookie_flags ~ secure;
    }

    # All other routes go to Vite dev server
    location / {
        proxy_pass http://frontend-auth:5173;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

