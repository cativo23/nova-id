services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/init-sql/create-dbs.sql:/docker-entrypoint-initdb.d/create-dbs.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ory-internal
      - apps
    restart: unless-stopped

  postgres-init:
    image: postgres:15-alpine
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ORY_PASSWORD: ${ORY_PASSWORD}
      KRATOS_DB_PASSWORD: ${KRATOS_DB_PASSWORD}
      HYDRA_DB_PASSWORD: ${HYDRA_DB_PASSWORD}
      KETO_DB_PASSWORD: ${KETO_DB_PASSWORD}
      DEMO_DB_PASSWORD: ${DEMO_DB_PASSWORD}
    command: >
      sh -c "
        until pg_isready -h postgres -U postgres; do sleep 1; done &&
        bash /docker-entrypoint-initdb.d/create-users.sh
      "
    volumes:
      - ./config/init-sql/create-users.sh:/docker-entrypoint-initdb.d/create-users.sh:ro
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - ory-internal
    restart: "no"

  # Mailpit - SMTP testing server (Web UI on :8025)
  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025" # SMTP port
      - "8025:8025" # Web UI port
    environment:
      - MP_SMTP_BIND_ADDR=0.0.0.0:1025
      - MP_WEB_BIND_ADDR=0.0.0.0:8025
    restart: unless-stopped
    networks:
      - ory-internal

  kratos-migrate:
    image: oryd/kratos:v25.4.0
    environment:
      # Ory path-mapped env vars: dots→underscores, uppercase. KRATOS_ prefix is
      # NOT recognized — the correct names are SECRETS_*, DSN, etc.
      - DSN=postgres://kratos_user:${KRATOS_DB_PASSWORD}@postgres:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4
      - SECRETS_COOKIE=${KRATOS_SECRETS_COOKIE}
      - SECRETS_CIPHER=${KRATOS_SECRETS_CIPHER}
      - SECRETS_DEFAULT=${KRATOS_SECRETS_DEFAULT}
    command: -c /etc/config/kratos/kratos.${ENVIRONMENT:-local}.yml migrate sql -e --yes
    volumes:
      - ./config/kratos:/etc/config/kratos:ro
    env_file:
      - .env
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - ory-internal
    restart: "no"

  kratos:
    image: oryd/kratos:v25.4.0
    environment:
      # Ory path-mapped env vars: dots→underscores, uppercase. KRATOS_ prefix is
      # NOT recognized — the correct names are SECRETS_*, DSN, COURIER_SMTP_*, etc.
      - DSN=postgres://kratos_user:${KRATOS_DB_PASSWORD}@postgres:5432/kratos?sslmode=disable&max_conns=20&max_idle_conns=4
      - SECRETS_COOKIE=${KRATOS_SECRETS_COOKIE}
      - SECRETS_CIPHER=${KRATOS_SECRETS_CIPHER}
      - SECRETS_DEFAULT=${KRATOS_SECRETS_DEFAULT}
      - COURIER_SMTP_CONNECTION_URI=${SMTP_CONNECTION_URI}
      - COURIER_SMTP_FROM_ADDRESS=${SMTP_FROM_ADDRESS}
    # --watch-courier runs the mail courier worker so recovery/verification emails reach Mailpit
    command: serve -c /etc/config/kratos/kratos.${ENVIRONMENT:-local}.yml --watch-courier
    volumes:
      - ./config/kratos:/etc/config/kratos:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4433/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    networks:
      - ory-internal
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  hydra-migrate:
    image: oryd/hydra:v25.4.0
    environment:
      - DSN=postgres://hydra_user:${HYDRA_DB_PASSWORD}@postgres:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4
      - HYDRA_DB_PASSWORD=${HYDRA_DB_PASSWORD}
      # Ory path-mapped env var: secrets.system ← SECRETS_SYSTEM. The HYDRA_ prefix is
      # NOT recognized and Ory does NOT expand ${VAR} in YAML, so the system secret must
      # arrive under this exact name. Sourced from HYDRA_SYSTEM_SECRET in .env.
      - SECRETS_SYSTEM=${HYDRA_SYSTEM_SECRET}
    command: migrate sql -e --yes -c /etc/config/hydra/hydra.${ENVIRONMENT:-local}.yml
    volumes:
      - ./config/hydra:/etc/config/hydra:ro
    env_file:
      - .env
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - ory-internal
    restart: "no"

  hydra:
    image: oryd/hydra:v25.4.0
    environment:
      - DSN=postgres://hydra_user:${HYDRA_DB_PASSWORD}@postgres:5432/hydra?sslmode=disable&max_conns=20&max_idle_conns=4
      - HYDRA_DB_PASSWORD=${HYDRA_DB_PASSWORD}
      # Ory path-mapped env var: secrets.system ← SECRETS_SYSTEM. The HYDRA_ prefix is
      # NOT recognized and Ory does NOT expand ${VAR} in YAML, so the system secret must
      # arrive under this exact name. Sourced from HYDRA_SYSTEM_SECRET in .env.
      - SECRETS_SYSTEM=${HYDRA_SYSTEM_SECRET}
    command: serve all -c /etc/config/hydra/hydra.${ENVIRONMENT:-local}.yml
    volumes:
      - ./config/hydra:/etc/config/hydra:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4444/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    networks:
      - ory-internal
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  keto-migrate:
    image: oryd/keto:v25.4.0
    environment:
      - DSN=postgres://keto_user:${KETO_DB_PASSWORD}@postgres:5432/keto?sslmode=disable&max_conns=20&max_idle_conns=4
      - KETO_DB_PASSWORD=${KETO_DB_PASSWORD}
    command: migrate up -c /etc/config/keto/keto.${ENVIRONMENT:-local}.yml --yes
    volumes:
      - ./config/keto:/etc/config/keto:ro
    env_file:
      - .env
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    networks:
      - ory-internal
    restart: "no"

  keto:
    image: oryd/keto:v25.4.0
    environment:
      - DSN=postgres://keto_user:${KETO_DB_PASSWORD}@postgres:5432/keto?sslmode=disable&max_conns=20&max_idle_conns=4
      - KETO_DB_PASSWORD=${KETO_DB_PASSWORD}
    command: serve -c /etc/config/keto/keto.${ENVIRONMENT:-local}.yml
    volumes:
      - ./config/keto:/etc/config/keto:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4466/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    networks:
      - ory-internal
    depends_on:
      keto-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # One-shot seed: writes Platform:nova#admins tuples to Keto for every Kratos
  # identity whose metadata_public.role == "platform_admin". Runs after keto AND
  # kratos are healthy. PUT is idempotent — safe to re-run on every `docker compose up`.
  # The bootstrap seed MUST write directly to keto:4467 (not through the Oathkeeper
  # gateway) to avoid the chicken-and-egg deadlock: no admin exists yet, so the
  # gateway's admin gate would reject the very write that creates the first admin.
  keto-seed:
    build:
      context: ./config/keto-seed
    volumes:
      - ./scripts/seed-permissions.sh:/seed-permissions.sh:ro
      - ./config/keto-seed/seed-app-members.sh:/seed-app-members.sh:ro
    entrypoint: ["/bin/sh", "-c", "/seed-permissions.sh && /seed-app-members.sh"]
    environment:
      - KETO_WRITE_URL=http://keto:4467
      - KRATOS_ADMIN_URL=http://kratos:4434
      - APP_ID=nova-id-test-app
      - MEMBER_EMAILS=admin@nova.test user@nova.test
    networks:
      - ory-internal
    depends_on:
      keto:
        condition: service_healthy
      kratos:
        condition: service_healthy
    restart: "no"

  # NestJS API service with access control and logging
  # ZERO TRUST: API is on external network; Oathkeeper injects auth headers.
  # API has ory-internal only for Hydra accept-login (OAuth flow completion).
  api:
    build:
      context: ./api
      dockerfile: Dockerfile.dev
    # API is NOT host-published — reachable only on the Docker networks for
    # Oathkeeper to proxy. Publishing it would let a direct request bypass the gateway.
    volumes:
      - ./api:/app
      - /app/node_modules
      - api_logs:/app/logs
    command: sh -c "npm install && npm run start:dev"
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - PORT=8080
      - OATHKEEPER_URL=http://oathkeeper:4455
      # API reaches Hydra Admin directly on the ory-internal network; no gateway hop.
      - HYDRA_ADMIN_URL=http://hydra:4445
      - KRATOS_ADMIN_URL=http://kratos:4434
      - KETO_READ_URL=http://keto:4466
      # Audit trail Postgres connection (nova_audit DB on the ory-internal network).
      - AUDIT_DB_HOST=postgres
      - AUDIT_DB_PORT=5432
      - AUDIT_DB_NAME=nova_audit
      - AUDIT_DB_USER=postgres
      - AUDIT_DB_PASSWORD=${POSTGRES_PASSWORD}
    networks:
      - apps
      - ory-internal
    depends_on:
      - oathkeeper
      - postgres
    restart: unless-stopped

  # ── Demo Relying-Party Backend ─────────────────────────────────────────────
  # Standalone NestJS service that owns demo_app Postgres and serves the
  # /api-test/* resource endpoints. Reachable ONLY via Oathkeeper — no
  # published ports, no ory-internal network access.
  demo-api:
    build:
      context: ./demo-api
      dockerfile: Dockerfile.dev
    volumes:
      - ./demo-api:/app
      - /app/node_modules
      - demo_api_logs:/app/logs
    command: sh -c "npm install && npm run start:dev"
    environment:
      - NODE_ENV=development
      - PORT=8080
      # JWKS endpoint — Oathkeeper decision API, reachable on the apps network.
      - JWKS_URL=http://oathkeeper:4456/.well-known/jwks.json
      # Issuer must match oathkeeper id_token mutator issuer_url.
      - OAUTH_ISSUER=https://id.cativo.dev/
      # Demo Postgres connection (demo_app DB, demo_user least-privilege).
      # demo_user has no access to IdP databases (kratos/hydra/keto/nova_audit).
      - DEMO_DB_HOST=postgres
      - DEMO_DB_PORT=5432
      - DEMO_DB_NAME=demo_app
      - DEMO_DB_USER=demo_user
      - DEMO_DB_PASSWORD=${DEMO_DB_PASSWORD}
      # CORS allowlist for demo-api responses (browser clients).
      - CORS_ALLOWED_ORIGINS=http://localhost:5175,http://app.ory.localhost
      # Demo app ID registered in Keto / Hydra for access checks.
      - APP_ID=nova-id-test-app
    networks:
      - apps
    depends_on:
      oathkeeper:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: unless-stopped

  oathkeeper:
    image: oryd/oathkeeper:v25.4.0
    command: serve -c /etc/config/oathkeeper/oathkeeper.${ENVIRONMENT:-local}.yml
    volumes:
      - ./config/oathkeeper:/etc/config/oathkeeper:ro
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:4456/health/ready",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    env_file:
      - .env
    networks:
      - ory-internal # Ory Stack network (can access Kratos, Keto, Hydra)
      - apps # External network (can access API, frontends)
    depends_on:
      kratos:
        condition: service_healthy
      keto:
        condition: service_healthy
      hydra:
        condition: service_healthy
    restart: unless-stopped

  # One-shot pnpm workspace install. Installs the WHOLE workspace once into the
  # shared named volumes below so the three dev services don't race each other
  # (concurrent `pnpm install` against the same store corrupts the symlink farm).
  # The dev services gate on this via `service_completed_successfully`.
  workspace-install:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    working_dir: /workspace
    volumes:
      - ./:/workspace
      - pnpm_root_nm:/workspace/node_modules
      - pnpm_auth_nm:/workspace/frontend-auth/node_modules
      - pnpm_admin_nm:/workspace/frontend-admin/node_modules
      - pnpm_app_nm:/workspace/frontend-app/node_modules
    # pnpm 11 deps install fully but exits non-zero when a build script is gated
    # (ERR_PNPM_IGNORED_BUILDS for esbuild). The deps are present regardless, so we
    # tolerate that exit and explicitly build esbuild's native binary via `rebuild`.
    # We then sentinel-check that the install actually produced a usable tree (orval +
    # vite present) instead of letting `|| true` mask a genuinely broken install, and
    # generate the gitignored @nova-id/api-client so a fresh clone can resolve it.
    # Sentinels target the per-package bin dirs: pnpm hoists each package's devDeps
    # into <package>/node_modules/.bin, not the workspace root, so checking root would
    # false-negative. orval lives with the api-client package; vite with each frontend.
    command: >
      sh -lc "pnpm install || true;
              pnpm rebuild esbuild;
              test -x packages/api-client/node_modules/.bin/orval || { echo 'FATAL: orval missing after install'; exit 1; };
              test -x frontend-admin/node_modules/.bin/vite || { echo 'FATAL: vite missing after install'; exit 1; };
              pnpm --filter @nova-id/api-client run generate;
              test -f packages/api-client/src/generated/admin/admin.ts || { echo 'FATAL: client not generated'; exit 1; }"
    networks:
      - apps
    restart: "no"

  # Frontend #1: Self-Service UI (Authentication flows)
  # ZERO TRUST: Frontends are on external network, can only access Ory services through Oathkeeper
  # Runs from the pnpm workspace root so workspace:* packages + hoisted deps resolve.
  frontend-auth:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "5173:5173"
    working_dir: /workspace/frontend-auth
    volumes:
      - ./:/workspace
      - pnpm_root_nm:/workspace/node_modules
      - pnpm_auth_nm:/workspace/frontend-auth/node_modules
    command: sh -lc "pnpm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      - VITE_KRATOS_PUBLIC_URL=http://localhost:4433
    networks:
      - apps
    depends_on:
      oathkeeper:
        condition: service_healthy
      workspace-install:
        condition: service_completed_successfully
    restart: unless-stopped

  # Frontend #2: Admin Dashboard (User & Permission Management)
  # ZERO TRUST: Frontends are on external network, can only access Ory services through Oathkeeper
  # Runs from the pnpm workspace root so workspace:* packages + hoisted deps resolve.
  frontend-admin:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "5174:5174"
    working_dir: /workspace/frontend-admin
    volumes:
      - ./:/workspace
      - pnpm_root_nm:/workspace/node_modules
      - pnpm_admin_nm:/workspace/frontend-admin/node_modules
    command: sh -lc "pnpm run dev -- --host 0.0.0.0 --port 5174"
    # No VITE_* env: admin reads .env.local (if present at /workspace/frontend-admin)
    # and otherwise falls back to in-code defaults (VITE_OATHKEEPER_URL=/api).
    networks:
      - apps
    depends_on:
      oathkeeper:
        condition: service_healthy
      workspace-install:
        condition: service_completed_successfully
    restart: unless-stopped

  # Frontend #3: Test Application (Business Logic with API Integration)
  # ZERO TRUST: Frontends are on external network, can only access Ory services through Oathkeeper
  # Runs from the pnpm workspace root so workspace:* packages + hoisted deps resolve.
  frontend-app:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "5175:5175"
    working_dir: /workspace/frontend-app
    volumes:
      - ./:/workspace
      - pnpm_root_nm:/workspace/node_modules
      - pnpm_app_nm:/workspace/frontend-app/node_modules
    command: sh -lc "pnpm run dev -- --host 0.0.0.0 --port 5175"
    environment:
      # Vite proxy target (vite.config.js) + the only VITE_* the app actually reads.
      # Both preserve the old image-build behavior (defaults were already /api).
      - API_PROXY_TARGET=http://oathkeeper:4455
      - VITE_OATHKEEPER_URL=/api
    networks:
      - apps
    depends_on:
      oathkeeper:
        condition: service_healthy
      workspace-install:
        condition: service_completed_successfully
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  api_logs:
    driver: local
  demo_api_logs:
    driver: local
  # pnpm-workspace node_modules: one shared root volume + per-SPA volumes.
  # These mask the host's old npm node_modules so pnpm's symlink farm stays clean.
  pnpm_root_nm:
  pnpm_auth_nm:
  pnpm_admin_nm:
  pnpm_app_nm:

networks:
  # Ory Stack internal network: Kratos, Hydra, Keto, Postgres
  # These services can communicate with each other
  ory-internal:
    driver: bridge
    name: nova-id-ory-internal

  # Apps network: Frontends and API (cannot directly access Ory services)
  # These services can ONLY access Ory services through Oathkeeper
  apps:
    driver: bridge
    name: nova-id-apps
