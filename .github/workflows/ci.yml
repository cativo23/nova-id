name: CI

# Mechanical gates that must pass before code lands on develop/main. Without this
# the project's quality scripts (typecheck, jest, openapi:verify, ADR-0001 boundary
# check) are dead letters — present but never enforced. See ADR-0001 for why the
# IdP/demo boundary is enforced by tooling rather than developer discipline.

on:
  push:
    branches: [develop, main]
  pull_request:
    branches: [develop, main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # pnpm workspace: the generated api-client + the three Vue SPAs.
  # `api/` is NOT a workspace member (it uses npm) — it has its own job below.
  # ---------------------------------------------------------------------------
  workspace:
    name: Workspace (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # dangerouslyAllowAllBuilds: pnpm 11 fails install (ERR_PNPM_IGNORED_BUILDS,
      # exit 1) whenever a dependency has an ignored build script. The pnpm-workspace
      # `onlyBuiltDependencies` allowlist does NOT suppress this gate on a fresh
      # frozen install (verified on pnpm 11.0.0 and 11.8.0). The only build-script
      # deps in the locked tree are esbuild (vite's native binary — required for the
      # SPA builds below) and vue-demi; with a frozen lockfile, allowing all builds
      # means exactly those trusted, pinned packages.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --config.dangerouslyAllowAllBuilds=true

      # frontend-auth and frontend-admin import @nova-id/api-client, whose generated
      # sources are gitignored (regenerated from api/openapi.json). Generate them
      # before typecheck/build so those imports resolve. api/openapi.json is committed.
      - name: Generate API client
        run: pnpm run client:gen

      - name: Typecheck (api-client + all SPAs)
        run: pnpm -r run typecheck

      - name: Build SPAs
        run: pnpm -r run build

  # ---------------------------------------------------------------------------
  # NestJS BFF (api/) — standalone npm project, not part of the pnpm workspace.
  # ---------------------------------------------------------------------------
  api:
    name: API (build + test + boundary)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: nova_audit
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      AUDIT_DB_HOST: localhost
      AUDIT_DB_PORT: "5432"
      AUDIT_DB_USER: postgres
      AUDIT_DB_PASSWORD: postgres
      AUDIT_DB_NAME: nova_audit
      # openapi:verify boots the full AppModule. OryModule's providers resolve these
      # via ConfigService.getOrThrow at boot (api/src/ory/ory.module.ts), so they must
      # exist or the app crashes before the spec is generated. The values are never
      # dialed — OpenAPI generation only reads decorator metadata, it makes no Ory
      # calls — so placeholder URLs are sufficient.
      HYDRA_ADMIN_URL: http://localhost:4445
      KETO_READ_URL: http://localhost:4466
      KRATOS_ADMIN_URL: http://localhost:4434
      # AuthenticatedGuard reads these via ConfigService.getOrThrow at boot
      # (api/src/guards/authenticated.guard.ts). The JwksClient is lazy — no
      # network call is made during generation — so placeholder URLs suffice.
      OAUTH_JWKS_URL: http://localhost:4456/.well-known/jwks.json
      OAUTH_ISSUER: http://localhost:4455/
    defaults:
      run:
        working-directory: ./api
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api/package-lock.json

      - name: Install dependencies
        run: npm ci

      # DemoModule's SQLite DB lives in api/data/ which is gitignored and therefore
      # absent on a fresh checkout. sqlite3 won't create the parent directory itself,
      # so we pre-create it here to prevent a boot-time SQLITE_CANTOPEN error.
      - name: Create demo SQLite data dir
        run: mkdir -p data

      - name: Build
        run: npm run build

      # Unit tests fully mock the audit repository so they run without a live DB.
      # The Postgres service above is required by openapi:verify (NestFactory boots
      # AppModule → AuditModule → TypeORM forRoot with migrationsRun: true).
      - name: Test
        run: npm test

      # Fails if the committed openapi.json drifts from the decorated controllers.
      - name: Verify OpenAPI is up to date
        run: npm run openapi:verify

      # Enforces the ADR-0001 one-way module boundary (IdP must not import demo).
      - name: Check module boundary (ADR-0001)
        run: npm run boundary:check
