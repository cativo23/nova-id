# Docker Compose override for local development (domain-based: auth.ory.localhost, etc.)
# Usage: docker-compose -f docker-compose.yml -f docker-compose.local.yml up
# local-proxy is only included here — never in production.

services:
  postgres:
    ports:
      - "5432:5432"

  kratos:
    ports:
      - "4433:4433"  # Public API (for debugging)
      - "4434:4434"  # Admin API (for debugging)
    command: serve -c /etc/config/kratos/kratos.${ENVIRONMENT:-local}.yml --dev --watch-courier

  hydra:
    ports:
      - "4444:4444"  # Public API (for OAuth flows)
      - "4445:4445"  # Admin API (for debugging)
    command: serve all -c /etc/config/hydra/hydra.local.yml --dev

  keto:
    ports:
      - "4466:4466"  # Read API (for debugging)
      - "4467:4467"  # Write API (for debugging)

  oathkeeper:
    ports:
      - "4455:4455"  # Proxy port
      - "4456:4456"  # API port

  api:
    ports:
      - "8080:8080"

  frontend-auth:
    ports:
      - "5173:5173"

  frontend-admin:
    ports:
      - "5174:5174"

  frontend-app:
    ports:
      - "5175:5175"

  mailpit:
    ports:
      - "1025:1025"
      - "8025:8025"

  # Local-only: reverse proxy for domain routing (port 80).
  # Routes auth.ory.localhost, admin.ory.localhost, api.ory.localhost, app.ory.localhost.
  # Not used in production (Traefik handles routing).
  local-proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx/local-proxy.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - apps
    depends_on:
      - frontend-auth
      - frontend-admin
      - frontend-app
      - oathkeeper
    restart: unless-stopped
