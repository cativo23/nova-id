<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <linearGradient id="favicon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#9d7cd8"/>
      <stop offset="100%" stop-color="#bb9af7"/>
    </linearGradient>
    <filter id="favicon-glow">
      <feGaussianBlur stdDeviation="1.2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <g filter="url(#favicon-glow)" transform="translate(24,24)">
    <path d="M 0,-18 L 15.6,-9 L 15.6,9 L 0,18 L -15.6,9 L -15.6,-9 Z" fill="none" stroke="url(#favicon-grad)" stroke-width="2.2" stroke-linejoin="round"/>
    <circle cx="0" cy="0" r="4" fill="#7dcfff"/>
  </g>
</svg>
